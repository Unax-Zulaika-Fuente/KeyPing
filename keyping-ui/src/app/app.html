<kp-header [locked]="lockState !== 'unlocked'"></kp-header>

<main class="container">
  <router-outlet />
</main>

<div class="lock-screen" *ngIf="lockState !== 'unlocked'">
  <div class="lock-card">
    <h2 *ngIf="lockState === 'locked'">{{ 'app.lock.titleLocked' | t }}</h2>
    <h2 *ngIf="lockState === 'unset'">{{ 'app.lock.titleUnset' | t }}</h2>
    <p class="muted small">
      {{ 'app.lock.subtitle' | t }}
    </p>

    <form (ngSubmit)="lockState === 'unset' ? onCreateMaster() : onUnlock()" class="lock-form">
      <label class="password-field">
        <span>
          {{
            lockState === 'unset'
              ? ('app.lock.masterLabel' | t)
              : ('app.lock.enterLabel' | t)
          }}
        </span>
        <div class="input-with-arrow">
          <input
            type="password"
            [(ngModel)]="masterPassword"
            name="masterPassword"
            autocomplete="current-password"
            required
          />
          <button
            type="submit"
            aria-label="{{ lockState === 'unset' ? ('app.lock.btnCreate' | t) : ('app.lock.btnUnlock' | t) }}"
            class="arrow-btn"
          >
            <svg viewBox="0 0 24 24" focusable="false">
              <path
                d="M5 12h14m-5-5l5 5-5 5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"
              />
            </svg>
          </button>
        </div>
      </label>

      <label *ngIf="lockState === 'unset'">
        <span>{{ 'app.lock.confirmLabel' | t }}</span>
        <input
          type="password"
          [(ngModel)]="masterPasswordConfirm"
          name="masterPasswordConfirm"
          autocomplete="new-password"
          required
        />
      </label>

      <div class="lock-actions">
        <div class="lock-feedback" *ngIf="masterError">
          <div class="chip danger">
            <span *ngIf="masterCooldownLabel; else plainError">
              {{ render(masterError) }} Жњ {{ render(masterCooldownLabel) }}
            </span>
            <ng-template #plainError>{{ render(masterError) }}</ng-template>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="page add-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">{{ 'add.eyebrow' | t }}</p>
      <h1>{{ 'add.title' | t }}</h1>
      <p class="muted">
        {{ 'add.subtitle' | t }}
      </p>
    </div>
    <div class="pill pill-muted">{{ 'add.badge' | t }}</div>
  </div>

  <div class="card-surface">
    <form class="form" (ngSubmit)="onSave()">
      <div class="form-grid">
        <label class="field service">
          <span class="label">{{ 'add.field.service' | t }}</span>
          <input
            type="text"
            [(ngModel)]="label"
            name="label"
            [placeholder]="'add.placeholder.service' | t"
          />
        </label>

        <label class="field folder">
          <span class="label">{{ 'add.field.folder' | t }}</span>
          <input
            type="text"
            [(ngModel)]="folder"
            name="folder"
            [placeholder]="'add.placeholder.folder' | t"
          />
        </label>

        <label class="field password-field">
          <span class="label">{{ 'add.field.password' | t }}</span>
          <input
            type="password"
            required
            [(ngModel)]="pwd"
            name="pwd"
            [placeholder]="'add.placeholder.password' | t"
            (input)="onPasswordInput()"
            [ngClass]="{ 'is-error': passwordError }"
          />
          <small class="field-error" *ngIf="passwordError">
            {{ 'add.error.required' | t }}
          </small>
        </label>

        <label class="field user">
          <span class="label">{{ 'add.field.username' | t }}</span>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            [placeholder]="'add.placeholder.username' | t"
          />
        </label>

        <label class="field email">
          <span class="label">{{ 'add.field.email' | t }}</span>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            [placeholder]="'add.placeholder.email' | t"
          />
        </label>

        <label class="field login">
          <span class="label">{{ 'add.field.loginUrl' | t }}</span>
          <input
            type="url"
            [(ngModel)]="loginUrl"
            name="loginUrl"
            [placeholder]="'add.placeholder.loginUrl' | t"
          />
        </label>

        <label class="field change">
          <span class="label">{{ 'add.field.changeUrl' | t }}</span>
          <input
            type="url"
            [(ngModel)]="passwordChangeUrl"
            name="passwordChangeUrl"
            [placeholder]="'add.placeholder.changeUrl' | t"
          />
        </label>
      </div>

      <div
        class="alert"
        *ngIf="alert"
        [ngClass]="alert.level"
      >
        <div class="alert-title">{{ alert.title }}</div>
        <div class="alert-text">{{ alert.message }}</div>
      </div>

      <div class="footer-row">
        <label class="field checkbox footer-checkbox">
          <input
            type="checkbox"
            [(ngModel)]="twoFactorEnabled"
            name="twoFactorEnabled"
          />
          <span class="label">{{ 'add.field.twoFactor' | t }}</span>
        </label>

        <div class="footer-actions">
          <button type="submit" class="btn primary">{{ 'add.actions.save' | t }}</button>
          <button type="button" class="btn ghost" (click)="onCancel()">
            {{ 'add.actions.cancel' | t }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

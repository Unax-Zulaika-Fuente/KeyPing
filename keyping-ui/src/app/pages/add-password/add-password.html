<section class="card">
  <h3 style="margin-top:0;">Add password</h3>

  <form (submit)="$event.preventDefault(); onSave();">
    <label for="pwd">Password</label>
    <input id="pwd" class="input" type="password" [(ngModel)]="pwd" name="pwd" (input)="debouncedCheck()"/>

    <label for="note">Note (optional)</label>
    <input id="note" class="input" type="text" [(ngModel)]="note" name="note"/>

    <div *ngIf="alert" class="alert" [style.borderLeft]="'4px solid ' + color(alert.level)">
    <strong>{{ alert.title }}</strong>
    <div class="muted">{{ alert.message }}</div>
    </div>

    <div style="margin-top:12px; display:flex; gap:8px;">
      <button class="btn primary" type="submit">Save</button>
      <a class="btn" routerLink="/dashboard">Cancel</a>
    </div>
  </form>
</section>

<div class="card">
  <h2>Add password</h2>

  <label>
    Password
    <input type="password"
           [(ngModel)]="pwd"
           (input)="debouncedCheck()"
           placeholder="Enter a new password" />
  </label>

  <label>
    Service / app name (optional)
    <input type="text"
           [(ngModel)]="label"
           placeholder="e.g. Gmail, Binance, Steam..." />
  </label>

  <div *ngIf="alert" class="alert" [ngClass]="alert.level">
    <strong>{{ alert.title }}</strong>
    <span>{{ alert.message }}</span>
  </div>

  <div class="actions">
    <button (click)="onSave()">Save</button>
    <button type="button" (click)="pwd = ''; label = ''; alert = undefined;">Cancel</button>
  </div>
</div>

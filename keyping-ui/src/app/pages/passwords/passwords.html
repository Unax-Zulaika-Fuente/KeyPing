<div class="page">
  <h1>Mis contraseñas</h1>

  <div *ngIf="loading" class="loading">
    Cargando contraseñas...
  </div>

  <div *ngIf="!loading && entries.length === 0" class="empty">
    No hay contraseñas guardadas todavía.
  </div>

  <div class="list" *ngIf="entries.length > 0">
    <div class="entry" *ngFor="let e of entries">
      <div class="header-row">
        <div class="title">
          {{ e.label || 'Sin nombre' }}
        </div>
        <div class="date">
          {{ fmtDate(e.createdAt) }}
        </div>
      </div>

      <div class="meta-row">
        <div class="chips">
          <span class="chip" *ngFor="let c of maskToChips(e.classMask)">
            {{ c }}
          </span>
        </div>
        <div class="length">
          Longitud: <b>{{ e.length }}</b>
        </div>
      </div>

      <div class="actions-row" *ngIf="editingId !== e.id">
        <button (click)="onCopy(e)">
          {{ copyingId === e.id ? 'Copied (' + copySecondsLeft + 's)' : 'Copy' }}
        </button>
        <button (click)="startEdit(e)">Edit</button>
        <button (click)="onDelete(e)">Delete</button>
      </div>

      <div class="edit-row" *ngIf="editingId === e.id">
        <input type="password"
               [(ngModel)]="newPwd"
               placeholder="New password for this service" />
        <button (click)="confirmEdit(e)">Save</button>
        <button (click)="cancelEdit()">Cancel</button>
      </div>
    </div>
  </div>
</div>
